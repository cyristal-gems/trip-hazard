<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Trip Hazard: The Game</title>
  <style>
    :root{
      --ink:#fffbe8; --bg:#102b24; --panel:rgba(12,38,31,.84); --muted:#d8efd0;
      --accent:#f4a62a; --accent-2:#5fcf7b; --lane:#f6d365; --ground:#255b33; --stripe:#7ec8d8;
      --sky1:#82d8ff; --sky2:#c9f0ff; --sky3:#ffe4a6;
      --obstacle:#3f9d4f; --obstacle-glow:#bff0a7; --obstacle-outline:#174422;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--ink); font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;}
    body{
      overflow-x:hidden;
      background:linear-gradient(180deg,#bfefff 0%,#def8db 48%,#102b24 100%);
    }
    .page{max-width:1120px; margin:0 auto; padding:0 12px 24px}
    .header{max-width:900px; margin:18px auto 16px; text-align:center;}
    .header h1{margin:0 0 8px; font-size:clamp(30px,5vw,46px); line-height:1; font-weight:950; color:#18392a; text-shadow:0 3px 0 rgba(255,255,255,.45)}
    .header p{max-width:680px; margin:0 auto; color:#315f43; font-size:15px; line-height:1.45}
    .stage{
      position:relative; width:100%; aspect-ratio:16/10; max-height:68vh; border-radius:14px;
      border:1px solid rgba(255,247,223,.16);
      box-shadow:0 28px 70px rgba(23,67,46,.38), 0 0 0 1px rgba(255,255,255,.18) inset;
      overflow:hidden; background:#8bdcff;
    }
    .stage::before{
      content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px) 0 0/100% 4px,
        radial-gradient(circle at 50% 35%, transparent 45%, rgba(0,0,0,.28) 100%);
      mix-blend-mode:screen; opacity:.45;
    }
    #game{background:linear-gradient(var(--sky1),var(--sky2) 60%); width:100%; height:100%; display:block}
    .ui-top-right{position:absolute; right:12px; top:12px; display:flex; align-items:center; gap:8px; z-index:3}
    .badge{
      min-width:78px; background:var(--panel); color:var(--ink); padding:8px 11px; border-radius:8px;
      border:1px solid rgba(255,247,223,.14); font-weight:900; letter-spacing:.4px;
      box-shadow:0 10px 24px rgba(0,0,0,.34); font-size:14px; font-variant-numeric:tabular-nums;
      text-align:center; backdrop-filter:blur(5px);
    }
    .btn{
      width:38px; height:36px; border:1px solid rgba(255,247,223,.14); background:var(--panel); color:var(--ink);
      font-weight:900; padding:0; border-radius:8px; cursor:pointer; box-shadow:0 10px 24px rgba(0,0,0,.34);
      display:grid; place-items:center; backdrop-filter:blur(5px);
    }
    .btn:hover,.ui-start .start:hover{filter:brightness(1.08)}
    .ui-start{position:absolute; left:50%; bottom:18px; transform:translateX(-50%); z-index:3}
    .ui-start .start{
      border:1px solid rgba(255,247,223,.24);
      background:linear-gradient(135deg,var(--accent),#ffd166);
      color:#fff; font-weight:950; padding:12px 18px; border-radius:8px; cursor:pointer;
      box-shadow:0 16px 34px rgba(0,0,0,.45), 0 0 24px rgba(255,90,111,.2);
    }
    .ui-start.is-restart{top:50%; bottom:auto; transform:translate(-50%,-50%)}
    .ui-start.is-restart .start{
      width:54px; height:54px; padding:0; border-radius:50%; font-size:30px; line-height:1;
      display:grid; place-items:center;
    }
    .visually-hidden{position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap}
    .controls-overlay{
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      background:rgba(18,22,27,.76); border:1px solid rgba(255,247,223,.13);
      padding:10px 12px; border-radius:8px; box-shadow:0 12px 28px rgba(0,0,0,.38);
      max-width:220px; z-index:3; backdrop-filter: blur(5px);
    }
    .controls-overlay h3{margin:0 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.35px; color:var(--accent-2)}
    .controls-overlay ul{margin:0 0 0 16px; padding:0; font-size:13px; line-height:1.4}
    .controls-overlay li{margin:4px 0}
    .controls-overlay strong{color:#fff3c0}
    @media (max-width: 540px){
      .stage{aspect-ratio:auto; height:85vh; max-height:none;}
      .ui-top-right{right:8px; top:8px; gap:6px;}
      .badge{min-width:64px; padding:6px 8px; font-size:12px;}
      .btn{width:32px; height:30px;}
      .controls-overlay{left:8px; bottom:10px; top:auto; transform:none; max-width:200px; padding:8px 10px;}
      .controls-overlay ul{font-size:12px;}
    }
  
    /* Prevent overlays from blocking gameplay; keep buttons clickable */
    .ui-top-right, .controls-overlay { pointer-events: none; }
    .ui-start { pointer-events: auto; }
    .ui-top-right .btn, .ui-start .start { pointer-events: auto; }

</style>
</head>
<body>
  <div class="header">
    <h1>Trip Hazard: The Game</h1>
    <p>A bright little marsh dash: guide the pixel duck as it hops over bushes and ducks under swooping birds.</p>
  </div>

  <div class="page">
    <div class="stage" id="stage">
      <canvas id="game"></canvas>

      <div class="ui-top-right">
        <span class="badge" id="best">HI 00000</span>
        <span class="badge" id="score">00000</span>
        <button class="btn" id="btnPause" title="P">⏸</button>
</div>

      <div class="ui-start" id="uiStart">
        <button class="start" id="btnStart" aria-label="Start game">▶ Start Hop</button>
      </div>

      <div class="controls-overlay" aria-label="Game controls">
        <h3>Controls</h3>
        <ul>
          <li><strong>Desktop:</strong> Space/↑ = Hop, ↓ = Duck</li>
        </ul>
      </div>

      <div class="visually-hidden" id="sr">Ready</div>
    </div>
  </div>

  <!-- Game script -->
  
<script>
(function(){
  // ===== DOM =====
  const canvas=document.getElementById('game'); const ctx=canvas.getContext('2d',{alpha:false});
  const stage=document.getElementById('stage');
  const uiStart=document.getElementById('uiStart');
  const btnStart=document.getElementById('btnStart');
  const btnPause=document.getElementById('btnPause');
  const elScore=document.getElementById('score');
  const elBest=document.getElementById('best');
  const sr=document.getElementById('sr');

  // ===== Helpers =====
  const DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  const S=(px)=>Math.floor(px*DPR);
  const rnd=(a,b)=>Math.random()*(b-a)+a;
  const pad5=(n)=>Math.floor(n).toString().padStart(5,'0');
  const collide=(a,b)=>!(a.x+a.w<b.x || a.x>b.x+b.w || a.y+a.h<b.y || a.y>b.y+b.h);
  let sceneReady=false;

  // ===== Fit canvas =====
  function fit(){
    const r=stage.getBoundingClientRect();
    canvas.width=Math.floor(r.width*DPR);
    canvas.height=Math.floor(r.height*DPR);
    canvas.style.width=r.width+'px';
    canvas.style.height=r.height+'px';
    if (sceneReady && !running){
      player.y=floorY();
      player.onGround=true;
      render(16);
    }
  }
  if ('ResizeObserver' in window) new ResizeObserver(()=>fit()).observe(stage);
  window.addEventListener('resize', fit, {passive:true});
  fit();

  // ===== Config =====
  const GROUND_H=56, GRAVITY=0.00205, FAST_DROP=0.0032;
  const START_SPEED=0.17, MAX_SPEED=0.43, ACCEL=0.0000048;
  const SCORE_RATE=0.012, CHECKPOINT=100;
  const GAP_MIN_START = 560;
  const GAP_MAX_START = 820;
  const GAP_MIN_LATE = 420;
  const GAP_MAX_LATE = 640;
  // Birds stay out of the opening run, then become a chance-based hazard.
  const BIRD_SCORE_UNLOCK = 80;
  const BIRD_CHANCE_START = 0.18;
  const BIRD_CHANCE_MAX = 0.48;
  const BIRD_CHANCE_RAMP = 420;

  // ===== State =====
  const player={ x:90, y:0, w:42, h:46, vy:0, onGround:false, ducking:false };
  let last=0, running=false, paused=false, gameOver=false, speed=START_SPEED;
  let obstacles=[], puffs=[];
  let spawnGap=S(560);

  
  // min duck hold state
  let duckHeld=false, duckUntil=0, nowMS=0;
  let birdsUnlocked=false;
  let score=0, scoreAcc=0, best=0; try{ best = +(localStorage.getItem('trip-hazard-best')||0); }catch(e){ best=0; }

  // ===== Init UI =====
  if (elBest) elBest.textContent='HI '+pad5(best);
  if (elScore) elScore.textContent='00000';
  if (sr) sr.textContent='Ready';

  const floorY=()=>canvas.height - S(GROUND_H) - S(player.h);

  // ===== Controls =====
  function start(){ reset(); }
  function jump(){
    if(!running||paused) return;
    if(player.onGround && !player.ducking){
      player.vy = -0.78 * (canvas.height/600);
      player.onGround=false;
    }
  }
  function setDuck(on){ player.ducking = on && player.onGround; }

  // Keyboard
  window.addEventListener('keydown', e=>{
    if (uiStart && !uiStart.hidden && (e.code==='Space' || e.code==='Enter' || e.code==='ArrowUp')) { e.preventDefault(); start(); return; }
    if (e.code==='Space' || e.code==='ArrowUp'){ e.preventDefault(); jump(); }
    if (e.code==='ArrowDown'){ e.preventDefault(); duckHeld = true; if (player.onGround) { setDuck(true); duckUntil = Math.max(duckUntil, nowMS + 180); } }
    if (e.code==='KeyP' && btnPause) { e.preventDefault(); pauseToggle(); }});
  window.addEventListener('keyup', e=>{ if (e.code==='ArrowDown'){ e.preventDefault(); duckHeld = false; } });

  if (btnStart) btnStart.addEventListener('click', (e)=>{ e.preventDefault(); start(); });
  // Click anywhere on stage or canvas to start when overlay is visible
  function maybeStartFromPointer(e){
    if (uiStart && !uiStart.hidden && !gameOver){ e.preventDefault(); start(); }
  }
  stage.addEventListener('mousedown', maybeStartFromPointer);
  canvas.addEventListener('mousedown', maybeStartFromPointer);

  if (btnPause) btnPause.addEventListener('click', (e)=>{ e.preventDefault(); pauseToggle(); });

  // Surface unexpected errors to the UI for easier debugging
  window.addEventListener('error', (ev)=>{
    try{
      if (sr) { sr.textContent = 'Error: ' + (ev.message || 'script error'); }
    }catch(_){}
  });

function pauseToggle(){ if(!running) return; paused=!paused; if(btnPause) btnPause.textContent = paused ? '▶' : '⏸'; if(!paused){ last=performance.now(); requestAnimationFrame(loop); } }
// ===== Obstacles =====
  function difficultyRamp(){
    return Math.min(1, score / 700);
  }

  function birdChance(){
    if (score < BIRD_SCORE_UNLOCK) return 0;
    const ramp = Math.min(1, (score - BIRD_SCORE_UNLOCK) / BIRD_CHANCE_RAMP);
    return BIRD_CHANCE_START + (BIRD_CHANCE_MAX - BIRD_CHANCE_START) * ramp;
  }

  function spawnBird(){
    const ramp = difficultyRamp();
    const size = rnd(30, 38) * (1 + ramp * 0.06);
    const birdH = S(size*0.72);
    const standingTop = floorY();
    const bottom = standingTop + S(rnd(7, 11));
    const y = bottom - birdH;
    obstacles.push({ kind:'bird', x: canvas.width + S(10), y, w: S(size), h: birdH, flap:0, bob:rnd(0, Math.PI*2) });
  }

  function spawnObstacle(){
    const ramp = difficultyRamp();
    const diff = 1 + ramp;
    const gapMin = GAP_MIN_START + (GAP_MIN_LATE - GAP_MIN_START) * ramp;
    const gapMax = GAP_MAX_START + (GAP_MAX_LATE - GAP_MAX_START) * ramp;
    const gap = rnd(gapMin, gapMax);

    let kind='bush';
    if (Math.random() < birdChance()){
      kind='bird';
    }

    if (kind==='bush'){
      const size = rnd(30, 46) * (1 + (diff-1)*0.08);
      const clusterCount = score > 260 && Math.random() < 0.28 ? (Math.random() < 0.55 ? 2 : 3) : 1;
      for(let i=0; i<clusterCount; i++){
        const bushSize = size * rnd(0.88, 1.08);
        const x = canvas.width + S(10) + S(i * bushSize * 0.72);
        obstacles.push({ kind:'bush', x, y: canvas.height - S(GROUND_H) - S(bushSize*0.86), w: S(bushSize), h: S(bushSize*0.86) });
      }
    } else {
      spawnBird();
    }
    spawnGap = S(gap);
  }

  // ===== Drawing =====
  function drawBackground(){
    const gY=canvas.height-S(GROUND_H);
    const cs=getComputedStyle(document.documentElement);
    const grd=ctx.createLinearGradient(0,0,0,gY);
    grd.addColorStop(0,cs.getPropertyValue('--sky1').trim()||'#0e1a2d');
    grd.addColorStop(0.62,cs.getPropertyValue('--sky2').trim()||'#c9f0ff');
    grd.addColorStop(1,cs.getPropertyValue('--sky3').trim()||'#f08a55');
    ctx.fillStyle=grd; ctx.fillRect(0,0,canvas.width,gY);

    const t=performance.now();
    ctx.fillStyle='rgba(255,216,102,.92)';
    ctx.beginPath(); ctx.arc(canvas.width-S(94), S(56), S(24), 0, Math.PI*2); ctx.fill();

    const cloudOff=(t*speed*.12) % S(260);
    ctx.fillStyle='rgba(255,255,255,.76)';
    for(let x=-S(260)-cloudOff, i=0; x<canvas.width+S(260); x+=S(260), i++){
      const y=S(42 + (i%3)*26);
      ctx.beginPath();
      ctx.ellipse(x+S(42), y+S(8), S(28), S(11), 0, 0, Math.PI*2);
      ctx.ellipse(x+S(68), y, S(34), S(14), 0, 0, Math.PI*2);
      ctx.ellipse(x+S(98), y+S(9), S(30), S(10), 0, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle='rgba(76,145,92,.42)';
    ctx.beginPath();
    ctx.moveTo(0,gY-S(38));
    for(let x=0; x<=canvas.width+S(80); x+=S(80)){
      ctx.quadraticCurveTo(x+S(40), gY-S(84)-((x/S(80))%2)*S(18), x+S(80), gY-S(38));
    }
    ctx.lineTo(canvas.width,gY); ctx.lineTo(0,gY); ctx.closePath(); ctx.fill();

    const reedOff=(t*speed*.36) % S(88);
    for(let x=-S(88)-reedOff, i=0; x<canvas.width+S(88); x+=S(44), i++){
      const base=gY-S(5);
      const reedH=S(24 + (i%4)*7);
      ctx.strokeStyle=i%2 ? 'rgba(46,111,54,.75)' : 'rgba(80,143,58,.65)';
      ctx.lineWidth=S(2);
      ctx.beginPath();
      ctx.moveTo(Math.floor(x), base);
      ctx.lineTo(Math.floor(x+S((i%3)-1)*2), base-reedH);
      ctx.stroke();
      ctx.fillStyle='rgba(117,83,42,.75)';
      ctx.fillRect(Math.floor(x-S(2)), base-reedH-S(5), S(5), S(9));
    }

    ctx.fillStyle='rgba(59,146,76,.98)'; ctx.fillRect(0,gY,canvas.width,S(GROUND_H));
    ctx.fillStyle='rgba(158,208,93,.9)'; ctx.fillRect(0,gY,canvas.width,S(7));
    ctx.fillStyle='rgba(94,67,38,.7)'; ctx.fillRect(0,gY+S(30),canvas.width,S(12));
    ctx.fillStyle=cs.getPropertyValue('--lane').trim()||'#f6d365';
    const step=S(74); const pathOff=(t*speed*1.45)%(step*2);
    for(let x=-step*2-pathOff; x<canvas.width; x+=step*2){
      ctx.fillRect(Math.floor(x),gY+S(34), step, S(5));
    }
    ctx.fillStyle='rgba(255,255,255,.18)';
    for(let x=-step-pathOff*.8; x<canvas.width; x+=step){
      ctx.fillRect(Math.floor(x),gY+S(14), S(18), S(2));
    }
  }

  function drawDuck(px,py){
    const unit = Math.max(2, S(2));
    const d = player.ducking;
    const hop = player.onGround ? Math.sin(nowMS * 0.018) * S(1.4) : 0;
    const wingLift = player.onGround ? Math.sin(nowMS * 0.02) * S(2) : -S(3);
    ctx.save();
    ctx.fillStyle='rgba(26,69,43,.24)';
    ctx.beginPath();
    ctx.ellipse(px+S(player.w/2), floorY()+S(player.h)+S(3), S(d?25:21), S(5), 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.save(); ctx.translate(px, py + hop);

    // body
    const bodyW = d ? S(40) : S(34);
    const bodyH = d ? S(21) : S(25);
    const bodyX = d ? S(2) : S(4);
    const bodyY = d ? S(21) : S(17);
    ctx.fillStyle='#6e4d16';
    ctx.beginPath(); ctx.ellipse(bodyX+bodyW/2, bodyY+bodyH/2, bodyW/2+unit, bodyH/2+unit, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd94f';
    ctx.beginPath(); ctx.ellipse(bodyX+bodyW/2, bodyY+bodyH/2, bodyW/2, bodyH/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff09a';
    ctx.beginPath(); ctx.ellipse(bodyX+bodyW*.68, bodyY+bodyH*.4, bodyW*.24, bodyH*.25, 0, 0, Math.PI*2); ctx.fill();

    // head
    const headX = d ? S(28) : S(29);
    const headY = d ? S(14) : S(7);
    const headR = d ? S(9) : S(11);
    ctx.fillStyle='#6e4d16';
    ctx.beginPath(); ctx.arc(headX, headY, headR+unit, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe878';
    ctx.beginPath(); ctx.arc(headX, headY, headR, 0, Math.PI*2); ctx.fill();

    // eye
    ctx.fillStyle='#173042'; ctx.fillRect(headX + unit, headY - unit*2, unit, unit);

    // bill
    ctx.fillStyle='#f28b30';
    ctx.fillRect(headX + headR - unit, headY - unit, unit*5, unit*2);
    ctx.fillStyle='#ffb24a';
    ctx.fillRect(headX + headR, headY + unit, unit*4, unit);

    // wing
    ctx.fillStyle='#e8ba34';
    ctx.beginPath();
    ctx.ellipse(bodyX + bodyW*.43, bodyY + bodyH*.48 + wingLift, S(9), S(5), -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#62c989';
    ctx.fillRect(bodyX + S(6), bodyY + bodyH - unit*2, S(12), unit);

    // feet when grounded
    if (player.onGround){
      const step = Math.sin(nowMS * 0.024);
      ctx.fillStyle='#f28b30';
      ctx.fillRect(bodyX + S(9), bodyY + bodyH + S(1 + Math.max(0, step)), S(9), unit);
      ctx.fillRect(bodyX + S(23), bodyY + bodyH + S(1 + Math.max(0, -step)), S(9), unit);
    }
    ctx.restore();
  }

  function drawBush(o){
    const x=Math.floor(o.x), y=Math.floor(o.y), w=o.w, h=o.h;
    const cs=getComputedStyle(document.documentElement);
    ctx.save();
    ctx.shadowColor=cs.getPropertyValue('--obstacle-glow').trim()||'#adffc1';
    ctx.shadowBlur=S(5);
    ctx.fillStyle=cs.getPropertyValue('--obstacle-outline').trim()||'#072818';
    const clumps=[
      [0.18,0.55,0.24],
      [0.38,0.34,0.3],
      [0.58,0.46,0.27],
      [0.8,0.6,0.22]
    ];
    for(const c of clumps){
      ctx.beginPath();
      ctx.arc(x+w*c[0], y+h*c[1], Math.max(S(6), w*c[2]), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle=cs.getPropertyValue('--obstacle').trim()||'#44d678';
    for(const c of clumps){
      ctx.beginPath();
      ctx.arc(x+w*c[0], y+h*c[1], Math.max(S(5), w*c[2]-S(2)), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle='#246f3a';
    ctx.fillRect(x+S(3), y + Math.floor(h*0.64), w-S(6), Math.floor(h*0.28));
    ctx.fillStyle='#ffef87';
    ctx.fillRect(x+Math.floor(w*.25), y+Math.floor(h*.26), S(3), S(3));
    ctx.fillStyle='#f08a55';
    ctx.fillRect(x+Math.floor(w*.66), y+Math.floor(h*.38), S(3), S(3));
    ctx.restore();
  }

  function drawBird(o, dt){
    o.flap = (o.flap + dt*0.01) % 1;
    const frame = o.flap < 0.5 ? 0 : 1;
    const x = Math.floor(o.x), y = Math.floor(o.y + Math.sin(nowMS*0.006 + o.bob)*S(1.5)), w = o.w, h = o.h;
    const unit = Math.max(2, S(2));
    ctx.save();
    ctx.shadowColor='rgba(38,91,89,.32)';
    ctx.shadowBlur=S(5);
    ctx.fillStyle='#27586c';
    ctx.beginPath();
    ctx.ellipse(x+w*.48, y+h*.46, w*.32, h*.32, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#9adbf0';
    ctx.beginPath();
    ctx.ellipse(x+w*.48, y+h*.46, w*.25, h*.23, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#e8fbff';
    ctx.beginPath();
    ctx.arc(x+w*.2, y+h*.36, Math.max(unit*2, h*.18), 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#173042';
    ctx.fillRect(x+w*.17, y+h*.3, unit, unit);
    ctx.fillStyle='#f28b30';
    ctx.beginPath();
    ctx.moveTo(x-S(2), y+h*.39);
    ctx.lineTo(x+w*.12, y+h*.34);
    ctx.lineTo(x+w*.12, y+h*.47);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#4aa0bb';
    if (frame===0){
      ctx.beginPath();
      ctx.moveTo(x+w*.44, y+h*.42);
      ctx.lineTo(x+w*.68, y+h*.88);
      ctx.lineTo(x+w*.78, y+h*.48);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(x+w*.44, y+h*.38);
      ctx.lineTo(x+w*.68, y-S(5));
      ctx.lineTo(x+w*.79, y+h*.36);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPuffs(){ ctx.fillStyle='rgba(255,209,102,.18)'; for(const p of puffs){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); } }

  // ===== Loop =====
  function reset(){
    last=performance.now(); running=true; paused=false; gameOver=false; speed=START_SPEED;
    obstacles.length=0; puffs.length=0; score=0; scoreAcc=0; spawnGap=S(620);
    birdsUnlocked=false;
    player.vy=0; player.ducking=false; player.y=floorY(); player.onGround=true;
    if (btnStart) { btnStart.textContent='▶ Start Hop'; btnStart.title=''; btnStart.setAttribute('aria-label','Start game'); }
    if (elScore) elScore.textContent='00000'; if (elBest) elBest.textContent='HI '+pad5(best);
    if (uiStart) { uiStart.hidden=true; uiStart.classList.remove('is-restart'); } if (sr) sr.textContent='Running';
    requestAnimationFrame(loop);
  }

  function update(dt){
    if(paused) return;

    // speed ramp
    speed = Math.min(MAX_SPEED, speed + ACCEL * dt);

    // score
    const prev = score;
    scoreAcc += dt * speed * (canvas.width/900) * SCORE_RATE;
    score = Math.floor(scoreAcc);
    if (score !== prev){
      if (elScore) elScore.textContent = pad5(score);
      if (score > best){ best = score; try{ localStorage.setItem('trip-hazard-best', best); }catch(e){} if (elBest) elBest.textContent='HI '+pad5(best); }
      if (score > 0 && score % CHECKPOINT === 0 && sr) sr.textContent='Checkpoint '+score;
      if (!birdsUnlocked && score >= BIRD_SCORE_UNLOCK){
        birdsUnlocked = true;
        if (sr) sr.textContent='Birds unlocked at '+BIRD_SCORE_UNLOCK;
      }
    }

    // physics
    const dropGravity = (!player.onGround && duckHeld) ? FAST_DROP : 0;
    player.vy += (GRAVITY + dropGravity) * dt * (canvas.height/600);
    player.y += player.vy * dt * DPR;
    const fy = floorY();
    if (player.y >= fy){
      if(!player.onGround){ puffs.push({x:S(player.x+player.w/2), y:canvas.height - S(GROUND_H)-S(3), r:S(2), life:260}); }
      player.y = fy; player.vy = 0; player.onGround = true;
    } else {
      player.onGround=false;
    }

    // auto-release duck after min hold if not held
    if (!duckHeld && player.ducking && nowMS >= duckUntil && player.onGround){
      setDuck(false);
    }

    // spawn + move obstacles
    const travel = speed*dt*DPR*(canvas.width/900);
    spawnGap -= travel; if (spawnGap<=0) spawnObstacle();
    for (const o of obstacles){ o.x -= travel; }
    obstacles = obstacles.filter(o=>o.x + o.w > -4);

    // collisions (ducking hitbox)
    const duckOffset = player.ducking ? S(14) : S(4);
    const ph = player.ducking ? S(player.h - 16) : S(player.h - 6);
    const pr = { x:S(player.x), y:Math.floor(player.y)+duckOffset, w:S(player.w), h:ph };
    for(const o of obstacles){
      const padX = o.kind==='bird' ? S(6) : S(3);
      const padY = o.kind==='bird' ? S(5) : S(2);
      const box={x:Math.floor(o.x)+padX, y:Math.floor(o.y)+padY, w:o.w-padX*2, h:o.h-padY*2};
      if (collide(pr, box)){
        gameOver=true;
        if (btnStart) { btnStart.textContent='↻'; btnStart.title='Restart'; btnStart.setAttribute('aria-label','Restart game'); }
        if (uiStart) { uiStart.hidden=false; uiStart.classList.add('is-restart'); }
        running=false; paused=false; if (sr) sr.textContent='Game over'; return;
      }
    }

    // puffs
    for(const p of puffs){ p.life -= dt; p.r += 0.06*dt/DPR; }
    puffs = puffs.filter(p=>p.life>0);
  }

  function render(dt){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();
    drawPuffs();
    for(const o of obstacles){ if (o.kind==='bush') drawBush(o); else drawBird(o, dt); }
    drawDuck(S(player.x), Math.floor(player.y));
  }

  function loop(t){ nowMS = t; if(!running||paused) return; const dt=Math.min(34, t-last); last=t; update(dt); render(dt); requestAnimationFrame(loop); }

  // Show start overlay by default and allow starting from UI and keyboard
  sceneReady=true;
  player.y=floorY();
  player.onGround=true;
  render(16);
  if (uiStart) uiStart.hidden=false;
})();
</script>

</body>
</html>
